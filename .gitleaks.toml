title = "Harbangan Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist"
paths = [
  '''\.env\.example$''',
  '''e2e-tests/.*\.spec\.ts$''',
  '''backend/src/.*tests?\.rs$''',
  '''backend/tests/.*\.rs$''',
  '''\.gitleaks\.toml$''',
  '''\.claude/plans/.*\.md$''',
]
regexTarget = "match"
regexes = [
  # Public OAuth device flow client IDs — not secrets
  '''9d1c250a-e61b-44d9-88ed-5944d1962f5e''',
  '''app_EMoamEEZ73f0CkXaXp7hrann''',
  # Placeholder / example values
  '''changeme''',
  '''your[-_](api[-_]key|password|secret|token)''',
  '''test[-_](key|token|secret|password)''',
  '''fake[-_](key|token|secret|password)''',
  '''<(secret|password|token|api[-_]key)>''',
]
