<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiro Gateway - Configuration</title>
  <link rel="stylesheet" href="/_ui/assets/style.css">
</head>
<body>
  <div class="top-bar">
    <h1>Kiro Gateway</h1>
    <div class="top-bar-right">
      <a href="/_ui/">Dashboard</a>
    </div>
  </div>

  <div class="container">
    <form id="config-form" onsubmit="saveConfig(event)">

      <!-- Server -->
      <div class="config-section">
        <h3>Server</h3>
        <div class="config-field">
          <label for="server_host">Host <span class="restart-badge">restart required</span></label>
          <input type="text" id="server_host" data-config="server_host">
        </div>
        <div class="config-field">
          <label for="server_port">Port <span class="restart-badge">restart required</span></label>
          <input type="number" id="server_port" data-config="server_port">
        </div>
      </div>

      <!-- Authentication -->
      <div class="config-section">
        <h3>Authentication</h3>
        <div class="config-field">
          <label for="proxy_api_key">Proxy API Key <span class="restart-badge">restart required</span></label>
          <input type="password" id="proxy_api_key" data-config="proxy_api_key">
          <button type="button" class="btn btn-sm" onclick="togglePasswordVisibility('proxy_api_key')">Show/Hide</button>
        </div>
      </div>

      <!-- Kiro -->
      <div class="config-section">
        <h3>Kiro</h3>
        <div class="config-field">
          <label for="kiro_region">Region</label>
          <input type="text" id="kiro_region" data-config="kiro_region">
        </div>
      </div>

      <!-- Timeouts -->
      <div class="config-section">
        <h3>Timeouts</h3>
        <div class="config-field">
          <label for="streaming_timeout">Streaming Timeout (s)</label>
          <input type="number" id="streaming_timeout" data-config="streaming_timeout">
        </div>
        <div class="config-field">
          <label for="first_token_timeout">First Token Timeout (s)</label>
          <input type="number" id="first_token_timeout" data-config="first_token_timeout">
        </div>
        <div class="config-field">
          <label for="token_refresh_threshold">Token Refresh Threshold (s)</label>
          <input type="number" id="token_refresh_threshold" data-config="token_refresh_threshold">
        </div>
      </div>

      <!-- HTTP Client -->
      <div class="config-section">
        <h3>HTTP Client</h3>
        <div class="config-field">
          <label for="http_max_connections">Max Connections</label>
          <input type="number" id="http_max_connections" data-config="http_max_connections">
        </div>
        <div class="config-field">
          <label for="http_connect_timeout">Connect Timeout (s)</label>
          <input type="number" id="http_connect_timeout" data-config="http_connect_timeout">
        </div>
        <div class="config-field">
          <label for="http_request_timeout">Request Timeout (s)</label>
          <input type="number" id="http_request_timeout" data-config="http_request_timeout">
        </div>
        <div class="config-field">
          <label for="http_max_retries">Max Retries</label>
          <input type="number" id="http_max_retries" data-config="http_max_retries">
        </div>
      </div>

      <!-- Debug -->
      <div class="config-section">
        <h3>Debug</h3>
        <div class="config-field">
          <label for="debug_mode">Debug Mode</label>
          <select id="debug_mode" data-config="debug_mode">
            <option value="Off">Off</option>
            <option value="Errors">Errors</option>
            <option value="All">All</option>
          </select>
        </div>
        <div class="config-field">
          <label for="log_level">Log Level</label>
          <select id="log_level" data-config="log_level">
            <option value="trace">trace</option>
            <option value="debug">debug</option>
            <option value="info">info</option>
            <option value="warn">warn</option>
            <option value="error">error</option>
          </select>
        </div>
      </div>

      <!-- Converter -->
      <div class="config-section">
        <h3>Converter</h3>
        <div class="config-field">
          <label for="tool_description_max_length">Tool Description Max Length</label>
          <input type="number" id="tool_description_max_length" data-config="tool_description_max_length">
        </div>
        <div class="config-field">
          <label for="fake_reasoning_enabled">Fake Reasoning Enabled</label>
          <input type="checkbox" id="fake_reasoning_enabled" data-config="fake_reasoning_enabled">
        </div>
        <div class="config-field">
          <label for="fake_reasoning_max_tokens">Fake Reasoning Max Tokens</label>
          <input type="number" id="fake_reasoning_max_tokens" data-config="fake_reasoning_max_tokens">
        </div>
      </div>

      <!-- Features -->
      <div class="config-section">
        <h3>Features</h3>
        <div class="config-field">
          <label for="truncation_recovery">Truncation Recovery</label>
          <input type="checkbox" id="truncation_recovery" data-config="truncation_recovery">
        </div>
        <div class="config-field">
          <label for="dashboard">Dashboard</label>
          <input type="checkbox" id="dashboard" data-config="dashboard">
        </div>
        <div class="config-field">
          <label for="tls_cert_path">TLS Cert Path <span class="restart-badge">restart required</span></label>
          <input type="text" id="tls_cert_path" data-config="tls_cert_path">
        </div>
        <div class="config-field">
          <label for="tls_key_path">TLS Key Path <span class="restart-badge">restart required</span></label>
          <input type="text" id="tls_key_path" data-config="tls_key_path">
        </div>
      </div>

      <button type="submit" class="btn">Save Configuration</button>
    </form>

    <!-- Config History -->
    <div class="card" style="margin-top: 24px;">
      <h3>Change History</h3>
      <table class="history-table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Field</th>
            <th>Old Value</th>
            <th>New Value</th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/_ui/assets/app.js"></script>
</body>
</html>
