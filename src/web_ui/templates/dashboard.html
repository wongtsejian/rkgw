<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiro Gateway - Dashboard</title>
  <link rel="stylesheet" href="/_ui/assets/style.css">
</head>
<body>
  <div class="top-bar">
    <h1>Kiro Gateway</h1>
    <div class="top-bar-right">
      <span><span id="status-dot" class="status-dot disconnected"></span><span id="status-text" class="status-text">Disconnected</span></span>
      <a href="/_ui/config">Config</a>
    </div>
  </div>

  <div class="container" id="dashboard">
    <!-- Gauges -->
    <div class="gauges-row">
      <div class="gauge">
        <div class="gauge-label">Active Connections</div>
        <div class="gauge-value" id="gauge-value-connections">0</div>
        <div class="gauge-bar-bg"><div class="gauge-bar" id="gauge-bar-connections" style="width:0%"></div></div>
      </div>
      <div class="gauge">
        <div class="gauge-label">CPU %</div>
        <div class="gauge-value" id="gauge-value-cpu">0</div>
        <div class="gauge-bar-bg"><div class="gauge-bar" id="gauge-bar-cpu" style="width:0%"></div></div>
      </div>
      <div class="gauge">
        <div class="gauge-label">Memory MB</div>
        <div class="gauge-value" id="gauge-value-memory">0</div>
        <div class="gauge-bar-bg"><div class="gauge-bar" id="gauge-bar-memory" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="card">
        <h3>Request Rate</h3>
        <canvas id="sparkline"></canvas>
      </div>
      <div class="card">
        <h3>Latency Percentiles</h3>
        <div class="latency-grid">
          <div class="latency-item">
            <div class="latency-label">p50</div>
            <div class="latency-value" id="latency-p50">-- ms</div>
          </div>
          <div class="latency-item">
            <div class="latency-label">p95</div>
            <div class="latency-value" id="latency-p95">-- ms</div>
          </div>
          <div class="latency-item">
            <div class="latency-label">p99</div>
            <div class="latency-value" id="latency-p99">-- ms</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Model Stats -->
    <div class="card mb-24">
      <h3>Model Stats</h3>
      <table class="model-table">
        <thead>
          <tr>
            <th>Model</th>
            <th>Requests</th>
            <th>Avg Latency (ms)</th>
            <th>Input Tokens</th>
            <th>Output Tokens</th>
          </tr>
        </thead>
        <tbody id="model-tbody"></tbody>
      </table>
    </div>

    <!-- Errors -->
    <div class="card mb-24">
      <h3>Errors by Type</h3>
      <div class="errors-row" id="errors-container">
        <div class="error-item"><div class="error-count">0</div><div class="error-label">No errors</div></div>
      </div>
    </div>

    <!-- Log Viewer -->
    <div class="card">
      <h3>Logs</h3>
      <div class="log-controls">
        <input type="text" placeholder="Search logs..." oninput="searchLogs(this.value)">
        <button class="btn btn-sm btn-active log-filter-btn" data-level="ALL" onclick="filterLogs('ALL')">All</button>
        <button class="btn btn-sm btn-inactive log-filter-btn" data-level="INFO" onclick="filterLogs('INFO')">Info</button>
        <button class="btn btn-sm btn-inactive log-filter-btn" data-level="WARN" onclick="filterLogs('WARN')">Warn</button>
        <button class="btn btn-sm btn-inactive log-filter-btn" data-level="ERROR" onclick="filterLogs('ERROR')">Error</button>
        <button class="btn btn-sm" id="autoscroll-btn" onclick="toggleAutoScroll()">Auto-scroll: ON</button>
      </div>
      <div class="log-viewer" id="log-container"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/_ui/assets/app.js"></script>
</body>
</html>
