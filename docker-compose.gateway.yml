# Proxy-only Docker Compose — single backend container, no DB, no frontend.
#
# Required env vars (set in .env.proxy or pass directly):
#   PROXY_API_KEY        — API key clients use to authenticate
#
# Optional (Kiro):
#   KIRO_REGION          — Kiro API region (default: us-east-1)
#   KIRO_SSO_REGION      — SSO OIDC region (default: same as KIRO_REGION)
#   KIRO_SSO_URL         — SSO issuer URL (auto-derived if omitted)
#
# Optional (multi-provider):
#   ANTHROPIC_API_KEY    — Anthropic API key (enables claude-* models)
#   OPENAI_API_KEY       — OpenAI API key (enables gpt-* models)
#   OPENAI_BASE_URL      — OpenAI base URL (default: https://api.openai.com/v1)
#   COPILOT_TOKEN        — GitHub Copilot token (or obtained via device flow)
#   COPILOT_BASE_URL     — Copilot API base URL
#   CUSTOM_PROVIDER_URL  — Custom OpenAI-compatible endpoint
#   CUSTOM_PROVIDER_KEY  — Custom provider API key
#   CUSTOM_PROVIDER_MODELS — Comma-separated model names for custom provider
#
# Optional (general):
#   SERVER_PORT          — Listen port (default: 8000)
#   LOG_LEVEL            — info, debug, warn, error (default: info)
#   DEBUG_MODE           — off, errors, all (default: off)
#
# Usage:
#   docker compose -f docker-compose.gateway.yml --env-file .env.proxy up -d

services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: harbangan-backend:latest
    restart: on-failure:5
    entrypoint: ["/app/entrypoint.sh"]
    ports:
      # Localhost only by default. Set BIND_ADDRESS=0.0.0.0 to allow Docker container access.
      - "${BIND_ADDRESS:-127.0.0.1}:${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      GATEWAY_MODE: "proxy"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "${SERVER_PORT:-8000}"
      PROXY_API_KEY: "${PROXY_API_KEY}"
      KIRO_REGION: "${KIRO_REGION:-us-east-1}"
      KIRO_SSO_REGION: "${KIRO_SSO_REGION:-}"
      KIRO_SSO_URL: "${KIRO_SSO_URL:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DEBUG_MODE: "${DEBUG_MODE:-off}"
      # Multi-provider credentials (all optional)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      COPILOT_TOKEN: "${COPILOT_TOKEN:-}"
      COPILOT_BASE_URL: "${COPILOT_BASE_URL:-}"
      CUSTOM_PROVIDER_URL: "${CUSTOM_PROVIDER_URL:-}"
      CUSTOM_PROVIDER_KEY: "${CUSTOM_PROVIDER_KEY:-}"
      CUSTOM_PROVIDER_MODELS: "${CUSTOM_PROVIDER_MODELS:-}"
      # Device flow control
      SKIP_DEVICE_FLOWS: "${SKIP_DEVICE_FLOWS:-}"
    volumes:
      - gateway-data:/data
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test:
        ["CMD", "curl", "-fs", "http://localhost:${SERVER_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  gateway-data:
