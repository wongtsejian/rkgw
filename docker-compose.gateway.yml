# Proxy-only Docker Compose — single backend container, no DB, no frontend.
#
# Required env vars (set in .env.proxy or pass directly):
#   PROXY_API_KEY        — API key clients use to authenticate
#
# Optional:
#   SERVER_PORT          — Listen port (default: 8000)
#   LOG_LEVEL            — info, debug, warn, error (default: info)
#   DEBUG_MODE           — off, errors, all (default: off)
#   KIRO_SSO_URL         — SSO issuer URL (auto-derived if omitted)
#   KIRO_SSO_REGION      — SSO OIDC region (default: same as KIRO_REGION)
#   KIRO_REGION          — Kiro API region (default: us-east-1)
#
# Usage:
#   docker compose -f docker-compose.gateway.yml --env-file .env.proxy up -d

services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kiro-gateway-backend:latest
    restart: on-failure:5
    entrypoint: ["/app/entrypoint.sh"]
    ports:
      # Localhost only by default. Set BIND_ADDRESS=0.0.0.0 to allow Docker container access.
      - "${BIND_ADDRESS:-127.0.0.1}:${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "${SERVER_PORT:-8000}"
      PROXY_API_KEY: "${PROXY_API_KEY}"
      KIRO_REGION: "${KIRO_REGION:-us-east-1}"
      KIRO_SSO_REGION: "${KIRO_SSO_REGION:-}"
      KIRO_SSO_URL: "${KIRO_SSO_URL:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DEBUG_MODE: "${DEBUG_MODE:-off}"
      GITHUB_COPILOT_CLIENT_ID: "${GITHUB_COPILOT_CLIENT_ID:-}"
      GITHUB_COPILOT_CLIENT_SECRET: "${GITHUB_COPILOT_CLIENT_SECRET:-}"
      GITHUB_COPILOT_CALLBACK_URL: "${GITHUB_COPILOT_CALLBACK_URL:-}"
    labels:
      com.datadoghq.ad.logs: '[{"source": "rust", "service": "rkgw-gateway"}]'
      com.datadoghq.tags.env: "${DD_ENV:-production}"
      com.datadoghq.tags.service: "rkgw-gateway"
    volumes:
      - gateway-data:/data
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test:
        ["CMD", "curl", "-fs", "http://localhost:${SERVER_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  datadog-agent:
    image: datadog/agent:latest
    profiles:
      - datadog
    restart: unless-stopped
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_ENV: ${DD_ENV:-production}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT: "0.0.0.0:4317"
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT: "0.0.0.0:4318"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "false"
      DD_CONTAINER_INCLUDE_LABELS: "com.datadoghq.tags.service"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  gateway-data:
