name: Bug Report
description: Report a bug in Harbangan
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Send request to /v1/chat/completions with ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      options:
        - Backend (Rust/Axum)
        - Frontend (React/Web UI)
        - Infrastructure (Docker)
        - E2E Tests (Playwright)
        - Multiple / Unknown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Deployment mode, OS, browser, or any relevant context.
      placeholder: |
        - Deployment: docker-compose.yml (full) / docker-compose.gateway.yml (proxy-only)
        - OS: macOS 15 / Ubuntu 24.04
        - Browser: Chrome 130 (if UI issue)

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error messages, stack traces, or log output. Do NOT include API keys, passwords, tokens, or other credentials — redact them first.
      render: shell
