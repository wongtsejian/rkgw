name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../../harbangan-${{ matrix.target }}.tar.gz harbangan
          cd ../../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: harbangan-${{ matrix.target }}
          path: harbangan-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate SHA256 checksums
        id: checksums
        run: |
          MACOS_INTEL_SHA=$(sha256sum artifacts/harbangan-x86_64-apple-darwin/harbangan-x86_64-apple-darwin.tar.gz | cut -d ' ' -f 1)
          echo "macos_intel_sha=$MACOS_INTEL_SHA" >> $GITHUB_OUTPUT

          MACOS_ARM_SHA=$(sha256sum artifacts/harbangan-aarch64-apple-darwin/harbangan-aarch64-apple-darwin.tar.gz | cut -d ' ' -f 1)
          echo "macos_arm_sha=$MACOS_ARM_SHA" >> $GITHUB_OUTPUT

          LINUX_INTEL_SHA=$(sha256sum artifacts/harbangan-x86_64-unknown-linux-gnu/harbangan-x86_64-unknown-linux-gnu.tar.gz | cut -d ' ' -f 1)
          echo "linux_intel_sha=$LINUX_INTEL_SHA" >> $GITHUB_OUTPUT

          LINUX_ARM_SHA=$(sha256sum artifacts/harbangan-aarch64-unknown-linux-gnu/harbangan-aarch64-unknown-linux-gnu.tar.gz | cut -d ' ' -f 1)
          echo "linux_arm_sha=$LINUX_ARM_SHA" >> $GITHUB_OUTPUT

      - name: Generate Homebrew formula
        run: |
          cat > harbangan.rb <<'FORMULA_EOF'
          class Harbangan < Formula
            desc "Proxy gateway for AI APIs - OpenAI and Anthropic compatible"
            homepage "https://github.com/if414013/harbangan"
            version "${{ steps.version.outputs.version }}"
            license "AGPL-3.0"

            on_macos do
              on_intel do
                url "https://github.com/if414013/harbangan/releases/download/v#{version}/harbangan-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.checksums.outputs.macos_intel_sha }}"
              end
              on_arm do
                url "https://github.com/if414013/harbangan/releases/download/v#{version}/harbangan-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.checksums.outputs.macos_arm_sha }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/if414013/harbangan/releases/download/v#{version}/harbangan-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.checksums.outputs.linux_intel_sha }}"
              end
              on_arm do
                url "https://github.com/if414013/harbangan/releases/download/v#{version}/harbangan-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.checksums.outputs.linux_arm_sha }}"
              end
            end

            def install
              bin.install "harbangan"
            end
          end
          FORMULA_EOF

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/if414013/homebrew-tvps.git tap-repo

          cp harbangan.rb tap-repo/Formula/harbangan.rb

          cd tap-repo
          git add Formula/harbangan.rb
          git commit -m "Update harbangan to ${{ steps.version.outputs.version }}"
          git push origin main
