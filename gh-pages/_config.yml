title: Kiro Gateway
description: >-
  A high-performance Rust proxy gateway that exposes OpenAI and Anthropic-compatible
  APIs, translating requests to the Kiro API (AWS CodeWhisperer) backend.

url: "https://if414013.github.io"
baseurl: "/rkgw"

remote_theme: just-the-docs/just-the-docs@v0.10.0

# Color scheme
color_scheme: dark

# Search
search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/

# Mermaid diagrams (script loading handled by head_custom.html;
# _includes/mermaid.html is overridden to prevent theme's default script)
mermaid:
  version: "11"

# Heading anchor links
heading_anchors: true

# Footer
footer_content: >-
  <a href="https://github.com/if414013/rkgw">Kiro Gateway on GitHub</a> &mdash;
  Built with Rust, Axum, and Tokio.

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Navigation structure
nav_external_links:
  - title: GitHub
    url: https://github.com/if414013/rkgw

# Aux links (top-right corner)
aux_links:
  "View on GitHub":
    - "https://github.com/if414013/rkgw"
aux_links_new_tab: true

# Callouts
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Plugins
plugins:
  - jekyll-seo-tag

# Kramdown settings
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
